services:
  # Frontend dashboard (Vite React SPA)
  - type: web
    runtime: static
    name: fplai-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    domains:
      - fplai.nl
    envVars:
      - key: VITE_API_BASE
        value: https://api.fplai.nl
    routes:
      # SPA fallback for React Router
      - type: rewrite
        source: /*
        destination: /index.html
